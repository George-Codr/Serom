name: Test Buildbot with Full psycopg

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: github
          POSTGRES_PASSWORD: github
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U github"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL readiness
        run: |
          for i in {1..15}; do
            pg_isready -h localhost -p 5432 -U github && break
            echo "Postgres not ready yet..."
            sleep 2
          done

      - name: Set DATABASE_URL
        run: |
          echo "DATABASE_URL=postgresql://github:github@localhost:5432/testdb" >> $GITHUB_ENV

      - name: Run Buildbot DB tests
        run: |
          pytest -vv test_buildbot_db.py
